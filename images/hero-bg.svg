<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <pattern id="texture" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#000" opacity="0.02"/>
      <circle cx="80" cy="40" r="1" fill="#000" opacity="0.015"/>
      <circle cx="40" cy="80" r="1" fill="#000" opacity="0.025"/>
      <circle cx="60" cy="10" r="1" fill="#000" opacity="0.01"/>
    </pattern>
  </defs>
  
  <!-- Base gradient -->
  <rect width="100%" height="100%" fill="url(#heroGrad)"/>
  
  <!-- Subtle texture overlay -->
  <rect width="100%" height="100%" fill="url(#texture)"/>
  
  <!-- Abstract geometric shapes for visual interest -->
  <path d="M0,400 Q480,200 960,400 T1920,400 L1920,1080 L0,1080 Z" fill="#000" opacity="0.02"/>
  <path d="M0,600 Q640,450 1280,600 T1920,600 L1920,1080 L0,1080 Z" fill="#000" opacity="0.015"/>
  
  <!-- Subtle light rays -->
  <path d="M800,0 L820,1080 L800,1080 Z" fill="#fff" opacity="0.3"/>
  <path d="M1100,0 L1120,1080 L1100,1080 Z" fill="#fff" opacity="0.2"/>
</svg>